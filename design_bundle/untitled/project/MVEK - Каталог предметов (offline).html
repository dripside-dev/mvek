  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ic */\n@font-face {\n  font-family: 'Pixelify Sans';\n  font-style: normal;\n  font-weight: 400 700;\n  font-display: swap;\n  src: url(\"b2316690-90c0-4bf0-befd-22994e70136f\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Pixelify Sans';\n  font-style: normal;\n  font-weight: 400 700;\n  font-display: swap;\n  src: url(\"88b68b8b-a856-4223-aebf-cdf5c5c522a6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Pixelify Sans';\n  font-style: normal;\n  font-weight: 400 700;\n  font-display: swap;\n  src: url(\"3baaa701-9238-415a-b75c-fb17f82e7220\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    /* UI / base */\n    --black:#0A0A0E;\n    --dark:#181620;\n    --dark2:#211d2c;\n    --white:#EBEBF0;\n    --gray:#787882;\n    --gold:#F0C850;\n    /* player / projectiles */\n    --player:#5AC8FF;\n    --report:#FAF0B4;\n    --critique:#FF6464;\n    --ticket:#C878FF;\n    /* enemies / hp */\n    --love:#EB466E;\n    --soul:#B4C8FF;\n    /* tiers */\n    --t1:#9A9AA6;\n    --t2:#56C878;\n    --t3:#C878FF;\n    --t4:#F0C850;\n\n    --pixel:'Pixelify Sans', system-ui, sans-serif;\n    --mono:'JetBrains Mono', ui-monospace, monospace;\n    --display:'Handjet', system-ui, sans-serif;\n  }\n\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html{scroll-behavior:smooth;}\n  body{\n    background:\n      radial-gradient(1200px 600px at 50% -10%, #1c1828 0%, transparent 60%),\n      var(--black);\n    color:var(--white);\n    font-family:var(--mono);\n    -webkit-font-smoothing:antialiased;\n    image-rendering:pixelated;\n    min-height:100vh;\n    padding-bottom:80px;\n  }\n\n  /* subtle scanline texture for the retro game-UI feel */\n  body::before{\n    content:\"\";\n    position:fixed; inset:0; z-index:1; pointer-events:none;\n    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);\n    mix-blend-mode:multiply; opacity:.5;\n  }\n  .wrap{position:relative; z-index:2; max-width:1240px; margin:0 auto; padding:0 24px;}\n\n  /* ===== HERO ===== */\n  header.hero{\n    padding:64px 0 28px;\n    text-align:center;\n  }\n  .kicker{\n    font-family:var(--mono); font-size:12px; letter-spacing:.32em;\n    color:var(--gray); text-transform:uppercase; margin-bottom:18px;\n  }\n  .kicker b{color:var(--gold);}\n  h1.title{\n    font-family:var(--display); font-weight:800;\n    font-size:clamp(54px,9vw,116px); line-height:.86;\n    letter-spacing:.02em;\n    color:var(--white);\n    text-shadow:0 0 0 var(--black), 4px 4px 0 #000, 0 0 38px rgba(240,200,80,.18);\n  }\n  h1.title em{font-style:normal; color:var(--gold);}\n  .subtitle{\n    margin:18px auto 0; max-width:640px; color:var(--gray);\n    font-size:14px; line-height:1.65;\n  }\n\n  /* ===== DESIGN NOTES PANEL ===== */\n  .panel{\n    background:linear-gradient(180deg, var(--dark2), var(--dark));\n    border:1px solid #2c2740;\n    border-radius:4px;\n    box-shadow:0 0 0 1px #000, 0 18px 40px -20px #000;\n    padding:26px 28px;\n  }\n  .notes{ margin-top:34px; }\n  .notes .ntag{\n    display:inline-block; font-family:var(--pixel); font-size:13px;\n    color:var(--black); background:var(--gold); padding:3px 10px;\n    border-radius:2px; margin-bottom:14px; letter-spacing:.04em;\n  }\n  .notes p{ font-size:13.5px; line-height:1.75; color:#c9c6d6; max-width:78ch; }\n  .notes p + p{ margin-top:11px; }\n  .notes strong{ color:var(--white); }\n  .notes .gold{ color:var(--gold); }\n\n  /* ===== SECTION HEADINGS ===== */\n  .secLabel{\n    display:flex; align-items:center; gap:14px;\n    font-family:var(--mono); font-size:12px; letter-spacing:.28em;\n    text-transform:uppercase; color:var(--gray);\n    margin:46px 0 18px;\n  }\n  .secLabel::after{ content:\"\"; flex:1; height:1px; background:#262236; }\n  .secLabel .dot{ width:9px; height:9px; }\n\n  /* ===== PALETTE STRIP ===== */\n  .swatches{ display:grid; grid-template-columns:repeat(auto-fill,minmax(112px,1fr)); gap:10px; margin-top:4px; }\n  .sw{ border:1px solid #2c2740; border-radius:3px; overflow:hidden; background:var(--dark); }\n  .sw .chip{ height:46px; border-bottom:1px solid #00000060; }\n  .sw .meta{ padding:7px 9px; }\n  .sw .nm{ font-family:var(--pixel); font-size:12px; color:var(--white); }\n  .sw .hx{ font-size:10px; color:var(--gray); letter-spacing:.05em; }\n\n  /* ===== TIER LEGEND ===== */\n  .tiers{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }\n  .tierCard{\n    position:relative; background:var(--dark); border:1px solid #2c2740;\n    border-radius:4px; padding:16px 16px 16px 18px; overflow:hidden;\n  }\n  .tierCard .bar{ position:absolute; left:0; top:0; bottom:0; width:5px; }\n  .tierCard h4{ font-family:var(--pixel); font-size:17px; margin-bottom:3px; }\n  .tierCard .tn{ font-size:11px; color:var(--gray); letter-spacing:.06em; text-transform:uppercase; }\n  .tierCard p{ font-size:11.5px; color:#b7b4c4; line-height:1.5; margin-top:8px; }\n  .tierCard .cnt{ position:absolute; top:13px; right:14px; font-family:var(--pixel); font-size:13px; color:var(--gray); }\n\n  /* ===== CONTROLS BAR ===== */\n  .controls{\n    position:sticky; top:0; z-index:30;\n    margin:40px 0 8px; padding:14px 16px;\n    background:rgba(12,11,18,.82); backdrop-filter:blur(8px);\n    border:1px solid #2c2740; border-radius:4px;\n    display:flex; flex-wrap:wrap; align-items:center; gap:10px;\n    box-shadow:0 8px 24px -16px #000;\n  }\n  .chips{ display:flex; flex-wrap:wrap; gap:7px; }\n  .chip-btn{\n    font-family:var(--pixel); font-size:13px; color:var(--gray);\n    background:transparent; border:1px solid #322c46; border-radius:3px;\n    padding:6px 12px; cursor:pointer; transition:all .14s; letter-spacing:.02em;\n    display:flex; align-items:center; gap:7px;\n  }\n  .chip-btn .sq{ width:9px; height:9px; border-radius:1px; }\n  .chip-btn:hover{ color:var(--white); border-color:#4a4368; }\n  .chip-btn.active{ color:var(--black); background:var(--white); border-color:var(--white); }\n  .chip-btn[data-tier=\"1\"].active{ background:var(--t1); border-color:var(--t1); }\n  .chip-btn[data-tier=\"2\"].active{ background:var(--t2); border-color:var(--t2); }\n  .chip-btn[data-tier=\"3\"].active{ background:var(--t3); border-color:var(--t3); color:#1a0f24;}\n  .chip-btn[data-tier=\"4\"].active{ background:var(--t4); border-color:var(--t4); }\n  .sep{ width:1px; height:22px; background:#322c46; }\n  .search{\n    margin-left:auto; display:flex; align-items:center; gap:8px;\n    background:var(--black); border:1px solid #322c46; border-radius:3px; padding:6px 12px;\n  }\n  .search input{\n    background:transparent; border:none; outline:none; color:var(--white);\n    font-family:var(--mono); font-size:13px; width:180px;\n  }\n  .search input::placeholder{ color:var(--gray); }\n  .search .ic{ color:var(--gray); font-size:13px; }\n  .count{ font-size:11px; color:var(--gray); letter-spacing:.08em; }\n\n  /* ===== ITEM GRID ===== */\n  .group{ margin-top:8px; }\n  .grid{\n    display:grid; grid-template-columns:repeat(auto-fill,minmax(238px,1fr)); gap:16px;\n  }\n\n  .card{\n    position:relative; background:linear-gradient(180deg,#1a1726,#141120);\n    border-radius:5px; padding:16px 16px 15px; overflow:hidden;\n    border:1px solid #2a2540;\n    transition:transform .16s ease, box-shadow .16s ease;\n  }\n  .card:hover{ transform:translateY(-3px); }\n\n  /* rarity frame — colored inner outline + glow */\n  .card{ --aura:var(--t1); }\n  .card[data-t=\"1\"]{ --aura:var(--t1); }\n  .card[data-t=\"2\"]{ --aura:var(--t2); }\n  .card[data-t=\"3\"]{ --aura:var(--t3); }\n  .card[data-t=\"4\"]{ --aura:var(--t4); }\n  .card::after{\n    content:\"\"; position:absolute; inset:0; border-radius:5px; pointer-events:none;\n    box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--aura) 55%, transparent),\n               inset 0 0 22px -8px var(--aura);\n  }\n  .card[data-t=\"1\"]{ box-shadow:0 0 0 1px #000, 0 10px 26px -18px #000; }\n  .card[data-t=\"2\"]{ box-shadow:0 0 0 1px #000, 0 0 22px -10px var(--t2), 0 10px 26px -18px #000; }\n  .card[data-t=\"3\"]{ box-shadow:0 0 0 1px #000, 0 0 26px -8px var(--t3), 0 10px 28px -18px #000; }\n  .card[data-t=\"4\"]{ box-shadow:0 0 0 1px #000, 0 0 30px -6px var(--t4), 0 12px 30px -18px #000; }\n  .card[data-t=\"3\"]{ animation:pulse3 3.4s ease-in-out infinite; }\n  .card[data-t=\"4\"]{ animation:pulse4 2.6s ease-in-out infinite; }\n  @keyframes pulse3{ 50%{ box-shadow:0 0 0 1px #000, 0 0 34px -6px var(--t3), 0 10px 28px -18px #000; } }\n  @keyframes pulse4{ 50%{ box-shadow:0 0 0 1px #000, 0 0 42px -2px var(--t4), 0 12px 30px -18px #000; } }\n  @media (prefers-reduced-motion:reduce){ .card{ animation:none !important; } }\n\n  .cardTop{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:13px; }\n  .badge{\n    font-family:var(--mono); font-size:9.5px; font-weight:700; letter-spacing:.12em;\n    text-transform:uppercase; padding:3px 7px; border-radius:2px;\n  }\n  .badge.passive{ color:var(--player); background:color-mix(in srgb,var(--player) 14%, transparent); }\n  .badge.active{ color:var(--critique); background:color-mix(in srgb,var(--critique) 16%, transparent); }\n  .tierPip{ display:flex; gap:3px; align-items:center; }\n  .tierPip i{ width:6px; height:11px; background:var(--aura); border-radius:1px; opacity:.35; }\n  .tierPip i.on{ opacity:1; box-shadow:0 0 6px var(--aura); }\n\n  /* ===== 28x28 SLOT ===== */\n  .slotWrap{ display:flex; justify-content:center; margin:2px 0 14px; }\n  .slot{\n    position:relative; width:116px; height:116px; border-radius:3px;\n    background:\n      /* center crosshair */\n      linear-gradient(var(--aura),var(--aura)) center/1px 100% no-repeat,\n      linear-gradient(var(--aura),var(--aura)) center/100% 1px no-repeat,\n      /* 4px pixel grid (28 cells over 112, scaled) */\n      repeating-linear-gradient(0deg,  #ffffff08 0 1px, transparent 1px 8.28px),\n      repeating-linear-gradient(90deg, #ffffff08 0 1px, transparent 1px 8.28px),\n      repeating-linear-gradient(45deg, #00000040 0 6px, #0000002a 6px 12px);\n    border:1px solid color-mix(in srgb, var(--aura) 45%, #000);\n    box-shadow:inset 0 0 16px -6px var(--aura);\n  }\n  .slot .cross{ position:absolute; inset:0; background:\n      linear-gradient(color-mix(in srgb,var(--aura) 60%,transparent),color-mix(in srgb,var(--aura) 60%,transparent)) center/1px 100% no-repeat,\n      linear-gradient(color-mix(in srgb,var(--aura) 60%,transparent),color-mix(in srgb,var(--aura) 60%,transparent)) center/100% 1px no-repeat;\n  }\n  .slot .hint{\n    position:absolute; left:50%; bottom:6px; transform:translateX(-50%);\n    font-family:var(--mono); font-size:8.5px; color:color-mix(in srgb,var(--aura) 75%, var(--white));\n    letter-spacing:.06em; white-space:nowrap; background:#0a0a0ecc; padding:1px 5px; border-radius:2px;\n  }\n  .slot .ghost{\n    position:absolute; top:7px; left:50%; transform:translateX(-50%);\n    font-family:var(--pixel); font-size:10px; color:#ffffff22; letter-spacing:.05em;\n  }\n  /* gold sparkle particles for T4 */\n  .spark{ position:absolute; width:4px; height:4px; pointer-events:none; z-index:5;\n    background:radial-gradient(var(--gold),transparent 70%); }\n  .card[data-t=\"4\"] .spark{ animation:tw 2.2s ease-in-out infinite; }\n  .card[data-t=\"4\"] .spark.s1{ top:14px; right:18px; animation-delay:0s; }\n  .card[data-t=\"4\"] .spark.s2{ top:42px; left:14px; animation-delay:.7s; }\n  .card[data-t=\"4\"] .spark.s3{ bottom:54px; right:24px; animation-delay:1.3s; }\n  @keyframes tw{ 0%,100%{ opacity:0; transform:scale(.4);} 50%{ opacity:1; transform:scale(1.4);} }\n\n  .iname{ font-family:var(--pixel); font-size:18px; line-height:1.08; color:var(--white); }\n  .card[data-t=\"4\"] .iname{ color:var(--gold); text-shadow:0 0 14px rgba(240,200,80,.4); }\n  .ieffect{ font-size:11.5px; line-height:1.5; color:#bcb9ca; margin-top:7px; min-height:34px; }\n  .brief{\n    margin-top:11px; padding-top:10px; border-top:1px dashed #2e2944;\n    font-size:10.5px; line-height:1.5; color:var(--gray);\n    display:flex; gap:7px;\n  }\n  .brief .arrow{ color:var(--aura); flex-shrink:0; }\n  .card[data-t=\"4\"] .brief .arrow{ color:var(--gold); }\n\n  .empty{ text-align:center; color:var(--gray); padding:60px 0; font-size:13px; display:none; }\n\n  footer{ text-align:center; color:#4a4658; font-size:11px; margin-top:60px; line-height:1.8; }\n  footer .gold{ color:var(--gold); }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<div class=\"wrap\">\n\n  <header class=\"hero\">\n    <div class=\"kicker\">MVEK · <b>top-down рогалик<\u002Fb> · студенческий колледж · семейный стиль<\u002Fdiv>\n    <h1 class=\"title\">БИБЛИОТЕКА<br><em>ПРЕДМЕТОВ<\u002Fem><\u002Fh1>\n    <p class=\"subtitle\">Арт-библия для пиксель-художника. Каждый предмет — слот 28×28&nbsp;px, единая палитра, рамки редкости от&nbsp;серой (Т1) до&nbsp;золотой (Т4). Снаряды — «доклады», валюта — рубли, здоровье — «Любовь и&nbsp;одобрение».<\u002Fp>\n  <\u002Fheader>\n\n  <!-- DESIGN NOTES TO MANAGER -->\n  <section class=\"panel notes\">\n    <span class=\"ntag\">Заметки дизайнера → менеджеру<\u002Fspan>\n    <p>Собрал все <strong>55 предметов<\u002Fstrong> в один каталог, сгруппированный по тирам. Это не финальный арт — это <strong>тех-задание для художника<\u002Fstrong>: каждый слот размечен под <span class=\"gold\">28×28&nbsp;px<\u002Fspan> с центральным крестиком и пиксельной сеткой (4&nbsp;px = 1 «логический» пиксель спрайта), чтобы силуэт держался в&nbsp;пределах ±14&nbsp;px от центра.<\u002Fp>\n    <p>Систему редкости вынес в&nbsp;живую UI-логику: <strong style=\"color:var(--t1)\">Т1<\u002Fstrong> — серая аура без свечения, <strong style=\"color:var(--t2)\">Т2<\u002Fstrong> — зелёное свечение, <strong style=\"color:var(--t3)\">Т3<\u002Fstrong> — фиолетовая пульсация, <strong style=\"color:var(--t4)\">Т4<\u002Fstrong> — золотая пульсация + искры. Эти же рамки/свечения можно переиспользовать в&nbsp;инвентаре и&nbsp;на&nbsp;дропе предмета в&nbsp;комнате.<\u002Fp>\n    <p>Палитра — строго из&nbsp;твоего гайда (внизу — свотчи). Тип предмета помечен бейджем <span style=\"color:var(--player)\">ПАССИВ<\u002Fspan> / <span style=\"color:var(--critique)\">АКТИВ<\u002Fspan>. Под каждым слотом — короткий <strong>визуальный бриф<\u002Fstrong> силуэта. Фильтры и&nbsp;поиск вверху. <span class=\"gold\">Дальше:<\u002Fspan> жду от&nbsp;тебя ок по&nbsp;тирам/эффектам — и&nbsp;можно отдавать художнику попартийно.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- PALETTE -->\n  <div class=\"secLabel\"><span class=\"dot\" style=\"background:var(--gold)\"><\u002Fspan>Палитра проекта<\u002Fdiv>\n  <div class=\"swatches\" id=\"swatches\"><\u002Fdiv>\n\n  <!-- TIER LEGEND -->\n  <div class=\"secLabel\"><span class=\"dot\" style=\"background:var(--t3)\"><\u002Fspan>Тиры редкости<\u002Fdiv>\n  <div class=\"tiers\" id=\"tiers\"><\u002Fdiv>\n\n  <!-- CONTROLS -->\n  <div class=\"controls\">\n    <div class=\"chips\" id=\"tierChips\">\n      <button class=\"chip-btn active\" data-filter=\"all\">Все<\u002Fbutton>\n      <button class=\"chip-btn\" data-tier=\"4\" data-filter=\"4\"><span class=\"sq\" style=\"background:var(--t4)\"><\u002Fspan>Т4<\u002Fbutton>\n      <button class=\"chip-btn\" data-tier=\"3\" data-filter=\"3\"><span class=\"sq\" style=\"background:var(--t3)\"><\u002Fspan>Т3<\u002Fbutton>\n      <button class=\"chip-btn\" data-tier=\"2\" data-filter=\"2\"><span class=\"sq\" style=\"background:var(--t2)\"><\u002Fspan>Т2<\u002Fbutton>\n      <button class=\"chip-btn\" data-tier=\"1\" data-filter=\"1\"><span class=\"sq\" style=\"background:var(--t1)\"><\u002Fspan>Т1<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"sep\"><\u002Fdiv>\n    <div class=\"chips\" id=\"typeChips\">\n      <button class=\"chip-btn active\" data-type=\"all\">Все типы<\u002Fbutton>\n      <button class=\"chip-btn\" data-type=\"passive\"><span class=\"sq\" style=\"background:var(--player)\"><\u002Fspan>Пассив<\u002Fbutton>\n      <button class=\"chip-btn\" data-type=\"active\"><span class=\"sq\" style=\"background:var(--critique)\"><\u002Fspan>Актив<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"search\">\n      <span class=\"ic\">⌕<\u002Fspan>\n      <input id=\"search\" type=\"text\" placeholder=\"поиск предмета…\">\n    <\u002Fdiv>\n    <div class=\"count\" id=\"count\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"groups\"><\u002Fdiv>\n  <div class=\"empty\" id=\"empty\">Ничего не найдено — попробуй другой запрос.<\u002Fdiv>\n\n  <footer>\n    MVEK · Item Library v1 · <span class=\"gold\">55 предметов<\u002Fspan> · 4 тира<br>\n    Слоты размечены под спрайты 28×28&nbsp;px · палитра из&nbsp;гайда проекта\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<script>\n// ============ PALETTE DATA ============\nconst PALETTE = [\n  {nm:'BLACK', hx:'#0A0A0E'}, {nm:'DARK', hx:'#181620'}, {nm:'WHITE', hx:'#EBEBF0'},\n  {nm:'GRAY', hx:'#787882'}, {nm:'GOLD', hx:'#F0C850'}, {nm:'PLAYER', hx:'#5AC8FF'},\n  {nm:'REPORT', hx:'#FAF0B4'}, {nm:'CRITIQUE', hx:'#FF6464'}, {nm:'TICKET', hx:'#C878FF'},\n  {nm:'LOVE', hx:'#EB466E'}, {nm:'SOUL', hx:'#B4C8FF'}, {nm:'TUTOR', hx:'#C85A6E'},\n  {nm:'TEACHER', hx:'#9650C8'}, {nm:'DOOR', hx:'#825832'},\n];\n\nconst TIERS = {\n  4:{nm:'Тир 4', sub:'Легендарные', col:'var(--t4)', desc:'Золотая аура + искры. Максимум деталей, мета-определяющие эффекты.'},\n  3:{nm:'Тир 3', sub:'Сильные', col:'var(--t3)', desc:'Фиолетовая пульсация. Заметно меняют билд, больше деталей.'},\n  2:{nm:'Тир 2', sub:'Крепкие', col:'var(--t2)', desc:'Зелёное свечение. Надёжные статы и приятные механики.'},\n  1:{nm:'Тир 1', sub:'Обычные', col:'var(--t1)', desc:'Серая аура без свечения. Простые статы, простой силуэт.'},\n};\n\n// ============ ITEM DATA ============\n// t = tier, type = passive|active, eff = effect, brief = visual silhouette brief\nconst ITEMS = [\n  // ---- TIER 4 ----\n  {n:'Стипендия', t:4, type:'passive', eff:'+99 рублей разом.', brief:'Пачка купюр, перевязана резинкой, золотой блик.'},\n  {n:'Зачётка-автомат', t:4, type:'passive', eff:'Один раз спасает от отчисления.', brief:'Зачётка с шестерёнкой/щитком, пиксельный механизм.'},\n  {n:'Модель Солнечной системы', t:4, type:'passive', eff:'7 спутниковых тетрадей вращаются вокруг.', brief:'Центр-«солнце» + орбиты с мини-тетрадями.'},\n  {n:'Алебастровая шкатулка', t:4, type:'active', eff:'Создаёт 2 предмета и 3 синих сердца.', brief:'Белая каменная шкатулка, голубое свечение из щели.'},\n\n  // ---- TIER 3 ----\n  {n:'Красный диплом', t:3, type:'passive', eff:'Золотые доклады, +урон, +скорострельность.', brief:'Красная корочка диплома с золотым тиснением.'},\n  {n:'Очки ботаника', t:3, type:'passive', eff:'Доклады наводятся на врагов.', brief:'Круглые очки, толстая оправа, блик на стекле.'},\n  {n:'Проездной на трамвай', t:3, type:'passive', eff:'Полёт (игнор препятствий).', brief:'Картонный билетик с дыроколом и трамвайчиком.'},\n  {n:'Стакан компота', t:3, type:'passive', eff:'Доклады замораживают врагов.', brief:'Гранёный стакан, ягоды, ледяной оттенок.'},\n  {n:'Линейка-указка', t:3, type:'passive', eff:'Пробивающие доклады.', brief:'Деревянная линейка с делениями, диагональ.'},\n  {n:'Указка преподавателя', t:3, type:'passive', eff:'Удар указкой ×3 урона (ближний бой).', brief:'Тонкая телескопическая указка с наконечником.'},\n  {n:'Молочный коктейль', t:3, type:'passive', eff:'×4 скорости, слабый урон.', brief:'Стакан с трубочкой, шапка пены, вишенка.'},\n  {n:'Помощник-первокурсник', t:3, type:'passive', eff:'Маленький фамильяр-стрелок.', brief:'Мини-студентик с рюкзаком, большие глаза.'},\n  {n:'Книга добродетелей', t:3, type:'passive', eff:'Огонёк-помощник кружит рядом.', brief:'Толстая книга с закладкой, искра-огонёк сверху.'},\n  {n:'Звезда отличника', t:3, type:'passive', eff:'+урон и регенерация.', brief:'Пятиконечная звезда, мягкая аура по контуру.'},\n  {n:'Студенческий Wi-Fi', t:3, type:'passive', eff:'Доклады наводятся (роутер).', brief:'Роутер с двумя антеннами, дуги сигнала.'},\n  {n:'Кнопка переэкзаменовки', t:3, type:'active', eff:'Сброс пассивов, +99 монет.', brief:'Большая красная аркадная кнопка на базе.'},\n  {n:'Печать декана', t:3, type:'passive', eff:'Запрещает снижение характеристик.', brief:'Круглая печать-штамп на ручке, оттиск.'},\n  {n:'Магнит с холодильника', t:3, type:'passive', eff:'Помеченный враг притягивает других.', brief:'Подковообразный магнит, красно-синие концы.'},\n  {n:'Студийная камера', t:3, type:'passive', eff:'Раскрывает соседние комнаты.', brief:'Ретро-кинокамера с двумя бобинами.'},\n  {n:'Театральная маска', t:3, type:'passive', eff:'Враги не видят 1.5 с.', brief:'Маска комедия/трагедия, половинки лиц.'},\n  {n:'Святой щит «Деканат»', t:3, type:'active', eff:'Щит, отражает снаряды.', brief:'Геральдический щит с гербом, золотой кант.'},\n  {n:'Откровение деканата', t:3, type:'active', eff:'Веер пробивающих докладов (луч света).', brief:'Расходящийся луч/веер света из точки.'},\n\n  // ---- TIER 2 ----\n  {n:'VR-шлем', t:2, type:'passive', eff:'+урон, +дальность.', brief:'VR-очки с ремешком, голубой блик визора.'},\n  {n:'Брусок мыла из туалета', t:2, type:'passive', eff:'+скорострельность.', brief:'Овальный брусок мыла, блик, пара пузырьков.'},\n  {n:'Валентинка от анонима', t:2, type:'passive', eff:'+макс. сердце, лечение.', brief:'Конверт с сердечком, розовый.'},\n  {n:'Гантеля', t:2, type:'passive', eff:'+урон, –скорость.', brief:'Гантель с двумя блинами, металл.'},\n  {n:'Забытая шпаргалка', t:2, type:'passive', eff:'Карта этажа, +удача.', brief:'Скрученная бумажка-гармошка с мелким текстом.'},\n  {n:'Зачётка с печатью', t:2, type:'passive', eff:'+2 синих сердца.', brief:'Синяя зачётка с круглой печатью.'},\n  {n:'Игровая гарнитура', t:2, type:'passive', eff:'+хп, +скорость.', brief:'Наушники с микрофоном-стрелой.'},\n  {n:'Идеальная тетрадь', t:2, type:'passive', eff:'+макс. сердце.', brief:'Чистая тетрадь в клетку, ровная обложка.'},\n  {n:'Кисть', t:2, type:'passive', eff:'Разноцветный след докладов.', brief:'Художественная кисть с цветным кончиком.'},\n  {n:'Медаль за учёбу', t:2, type:'passive', eff:'+удача, +урон.', brief:'Круглая медаль на ленточке, золото.'},\n  {n:'Настольная лампа', t:2, type:'passive', eff:'Скрытые комнаты на карте.', brief:'Лампа-гармошка с круглым плафоном, свет.'},\n  {n:'Ноутбук', t:2, type:'passive', eff:'+удача, +скорострельность.', brief:'Открытый ноутбук, светящийся экран.'},\n  {n:'Орбитальный конспект', t:2, type:'passive', eff:'Тетрадь летает вокруг, блокирует снаряды.', brief:'Тетрадь с орбитальной дугой вокруг.'},\n  {n:'Палитра', t:2, type:'passive', eff:'+урон, +скорострельность.', brief:'Палитра художника с кляксами краски.'},\n  {n:'Пропуск в столовую', t:2, type:'passive', eff:'Подбираемое летит к игроку (магнит).', brief:'Бейдж-карта на шнурке, иконка вилки.'},\n  {n:'Свеча на парте', t:2, type:'passive', eff:'+скорость за чистые комнаты.', brief:'Свеча в подсвечнике, тёплый огонёк.'},\n  {n:'Свисток тренера', t:2, type:'passive', eff:'Урон по площади при получении урона.', brief:'Спортивный свисток на шнурке.'},\n  {n:'Проездной «Меркурий»', t:2, type:'passive', eff:'+скорость, открытые двери.', brief:'Транспортная карта, голубой логотип.'},\n  {n:'Тяжёлый рюкзак', t:2, type:'passive', eff:'+урон, –скорость.', brief:'Набитый рюкзак с лямками, молнии.'},\n  {n:'Футбольный мяч', t:2, type:'passive', eff:'Рикошет-снаряд.', brief:'Чёрно-белый мяч, классические пятиугольники.'},\n  {n:'Чернильница', t:2, type:'passive', eff:'+скорострельность, +урон.', brief:'Стеклянная чернильница с пером.'},\n  {n:'Энергетик «3 часа ночи»', t:2, type:'active', eff:'×3 скорострельности на 5 с.', brief:'Банка энергетика, молния на этикетке.'},\n\n  // ---- TIER 1 ----\n  {n:'USB-флешка', t:1, type:'passive', eff:'Заряд активного предмета за комнату.', brief:'Флешка с колпачком, металлический разъём.'},\n  {n:'Беговые кроссовки', t:1, type:'passive', eff:'+скорость.', brief:'Кроссовок сбоку, шнурки, подошва.'},\n  {n:'Закладка', t:1, type:'passive', eff:'+скорострельность.', brief:'Ленточка-закладка с хвостиком.'},\n  {n:'Кружка кофе из автомата', t:1, type:'passive', eff:'+скорость.', brief:'Пластиковый стаканчик, парок сверху.'},\n  {n:'Лупа', t:1, type:'passive', eff:'Крупнее доклады, +урон.', brief:'Лупа с ручкой, блик на стекле.'},\n  {n:'Нота с прослушки', t:1, type:'passive', eff:'+скорость.', brief:'Музыкальная нота (восьмая), хвостик.'},\n  {n:'Перьевая ручка', t:1, type:'passive', eff:'+урон, чёрный шлейф.', brief:'Перьевая ручка под углом, золотое перо.'},\n  {n:'Спортивная повязка', t:1, type:'passive', eff:'+скорость, +хп.', brief:'Повязка на голову с узелком.'},\n  {n:'Читательский билет', t:1, type:'passive', eff:'+удача.', brief:'Картонный билетик с уголком и текстом.'},\n  {n:'Шапочка выпускника', t:1, type:'passive', eff:'+скорость, +скорострельность.', brief:'Академическая шапочка с кисточкой.'},\n  {n:'Энциклопедия', t:1, type:'passive', eff:'+урон.', brief:'Толстая книга-том, корешок с полосами.'},\n];\n\n// ============ RENDER PALETTE ============\nconst isLight = hx => { const r=parseInt(hx.slice(1,3),16),g=parseInt(hx.slice(3,5),16),b=parseInt(hx.slice(5,7),16); return (r*299+g*587+b*114)/1000 > 150; };\ndocument.getElementById('swatches').innerHTML = PALETTE.map(p=>`\n  <div class=\"sw\">\n    <div class=\"chip\" style=\"background:${p.hx}\"><\u002Fdiv>\n    <div class=\"meta\"><div class=\"nm\">${p.nm}<\u002Fdiv><div class=\"hx\">${p.hx}<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`).join('');\n\n// ============ RENDER TIERS ============\ndocument.getElementById('tiers').innerHTML = [4,3,2,1].map(t=>{\n  const T=TIERS[t]; const c=ITEMS.filter(i=>i.t===t).length;\n  return `<div class=\"tierCard\">\n    <div class=\"bar\" style=\"background:${T.col}\"><\u002Fdiv>\n    <div class=\"cnt\">${c}<\u002Fdiv>\n    <h4 style=\"color:${T.col}\">${T.nm}<\u002Fh4>\n    <div class=\"tn\">${T.sub}<\u002Fdiv>\n    <p>${T.desc}<\u002Fp>\n  <\u002Fdiv>`;\n}).join('');\n\n// ============ RENDER ITEMS ============\nfunction pips(t){ let s=''; for(let i=0;i<4;i++) s+=`<i class=\"${i<t?'on':''}\"><\u002Fi>`; return s; }\nfunction card(it){\n  const sparks = it.t===4 ? `<span class=\"spark s1\"><\u002Fspan><span class=\"spark s2\"><\u002Fspan><span class=\"spark s3\"><\u002Fspan>` : '';\n  return `<div class=\"card\" data-t=\"${it.t}\" data-type=\"${it.type}\" data-name=\"${it.n.toLowerCase()}\" data-eff=\"${it.eff.toLowerCase()}\">\n    ${sparks}\n    <div class=\"cardTop\">\n      <span class=\"badge ${it.type}\">${it.type==='passive'?'Пассив':'Актив'}<\u002Fspan>\n      <span class=\"tierPip\" title=\"Тир ${it.t}\">${pips(it.t)}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"slotWrap\">\n      <div class=\"slot\">\n        <span class=\"ghost\">28×28<\u002Fspan>\n        <span class=\"hint\">силуэт ±14px<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"iname\">${it.n}<\u002Fdiv>\n    <div class=\"ieffect\">${it.eff}<\u002Fdiv>\n    <div class=\"brief\"><span class=\"arrow\">▸<\u002Fspan><span>${it.brief}<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nconst groupsEl = document.getElementById('groups');\ngroupsEl.innerHTML = [4,3,2,1].map(t=>{\n  const T=TIERS[t];\n  const cards = ITEMS.filter(i=>i.t===t).map(card).join('');\n  return `<section class=\"group\" data-group=\"${t}\">\n    <div class=\"secLabel\"><span class=\"dot\" style=\"background:${T.col}\"><\u002Fspan>${T.nm} — ${T.sub} · ${ITEMS.filter(i=>i.t===t).length}<\u002Fdiv>\n    <div class=\"grid\">${cards}<\u002Fdiv>\n  <\u002Fsection>`;\n}).join('');\n\n// ============ FILTER LOGIC ============\nlet fTier='all', fType='all', fQuery='';\nconst cards = [...document.querySelectorAll('.card')];\nconst countEl = document.getElementById('count');\n\nfunction apply(){\n  let visible=0;\n  cards.forEach(c=>{\n    const okT = fTier==='all' || c.dataset.t===fTier;\n    const okType = fType==='all' || c.dataset.type===fType;\n    const okQ = !fQuery || c.dataset.name.includes(fQuery) || c.dataset.eff.includes(fQuery);\n    const show = okT && okType && okQ;\n    c.style.display = show?'':'none';\n    if(show) visible++;\n  });\n  // hide empty groups\n  document.querySelectorAll('.group').forEach(g=>{\n    const any = [...g.querySelectorAll('.card')].some(c=>c.style.display!=='none');\n    g.style.display = any?'':'none';\n  });\n  document.getElementById('empty').style.display = visible?'none':'block';\n  countEl.textContent = visible+' / '+cards.length;\n}\n\ndocument.getElementById('tierChips').addEventListener('click',e=>{\n  const b=e.target.closest('.chip-btn'); if(!b) return;\n  document.querySelectorAll('#tierChips .chip-btn').forEach(x=>x.classList.remove('active'));\n  b.classList.add('active'); fTier=b.dataset.filter; apply();\n});\ndocument.getElementById('typeChips').addEventListener('click',e=>{\n  const b=e.target.closest('.chip-btn'); if(!b) return;\n  document.querySelectorAll('#typeChips .chip-btn').forEach(x=>x.classList.remove('active'));\n  b.classList.add('active'); fType=b.dataset.type; apply();\n});\ndocument.getElementById('search').addEventListener('input',e=>{ fQuery=e.target.value.trim().toLowerCase(); apply(); });\n\napply();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
